<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Palworld Server</title>
  <style>
    :root{--bg:#0d0d0f;--panel:#161619;--panel2:#1c1c20;--hover:#242429;--border:rgba(255,255,255,.085);--text:#f5f5f7;--muted:#8d8d95;--accent:#ff5c57;--purple:#a66cff;--green:#55d58b;--yellow:#f6c85f;--danger:#ff5c68;--shadow:0 24px 80px rgba(0,0,0,.48)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -20%,#2a202a 0,transparent 35%),var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","PingFang SC",sans-serif}button,input,select{font:inherit}.app{width:min(1480px,calc(100vw - 36px));min-height:calc(100vh - 36px);margin:18px auto;display:grid;grid-template-columns:220px minmax(0,1fr);background:rgba(18,18,21,.96);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
    .sidebar{background:linear-gradient(180deg,rgba(29,29,33,.98),rgba(19,19,22,.98));border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column}.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}.logo{width:35px;height:35px;border-radius:10px;background:linear-gradient(145deg,#ff655f,#d7498d 52%,#815ce8);display:grid;place-items:center;font-weight:900;box-shadow:0 8px 26px rgba(223,73,127,.3)}.brand strong{font-size:14px}.brand small{display:block;color:var(--muted);font-size:11px}.nav{display:grid;gap:4px}.nav button{display:flex;align-items:center;gap:10px;border:0;border-radius:9px;padding:9px 10px;background:transparent;color:#b4b4bb;text-align:left;cursor:pointer}.nav button:hover{background:var(--hover);color:#fff}.nav button.active{background:linear-gradient(90deg,rgba(255,92,87,.18),rgba(166,108,255,.12));color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.045)}.ico{width:18px;text-align:center;color:#aaa}.nav button.active .ico{color:#ff7771}.sidebar-foot{margin-top:auto;border-top:1px solid var(--border);padding:15px 9px 2px;color:var(--muted);font-size:11px}.server-mini{display:flex;align-items:center;gap:8px;margin-bottom:6px}.dot{width:8px;height:8px;border-radius:50%;background:#666}.dot.on{background:var(--green);box-shadow:0 0 0 4px rgba(85,213,139,.1)}
    .workspace{min-width:0}.commandbar{height:62px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;background:rgba(21,21,24,.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10}.search{position:relative;flex:1}.search input{width:100%;height:38px;padding:0 78px 0 35px;background:#111114;border:1px solid var(--border);border-radius:9px;color:var(--text);outline:none}.search input:focus{border-color:rgba(255,112,108,.5);box-shadow:0 0 0 3px rgba(255,92,87,.08)}.search:before{content:"⌕";position:absolute;left:12px;top:7px;color:#777;font-size:18px}.shortcut{position:absolute;right:9px;top:8px;color:#666;font-size:11px;border:1px solid var(--border);border-radius:5px;padding:1px 6px}.btn{height:36px;border:1px solid var(--border);border-radius:8px;background:#242428;color:#ddd;padding:0 13px;cursor:pointer;white-space:nowrap}.btn:hover{background:#2d2d32;color:#fff}.btn.primary{border-color:rgba(255,113,108,.42);background:linear-gradient(135deg,#ee5853,#d94b77);color:white;font-weight:650}.btn.danger{color:#ff858b}.btn:disabled{opacity:.45;cursor:wait}.dirty{display:none;color:var(--yellow);font-size:11px}.dirty.show{display:inline}
    .content{padding:26px;max-width:1240px;margin:0 auto}.page-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:22px}.page-head h1{font-size:24px;letter-spacing:-.025em;margin:0 0 4px}.page-head p{margin:0;color:var(--muted)}.doc-badge{border:1px solid var(--border);background:#1c1c20;border-radius:999px;padding:5px 10px;color:#aaa;font-size:11px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric,.panel,.field-card{border:1px solid var(--border);background:linear-gradient(145deg,#1b1b1f,#161619);border-radius:12px}.metric{padding:16px}.metric-label{color:var(--muted);font-size:12px}.metric-value{font-size:20px;font-weight:700;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metric-value.good{color:var(--green)}.panel{margin-top:14px;padding:18px}.panel-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.panel-title h2{font-size:14px;margin:0}.actions{display:flex;flex-wrap:wrap;gap:8px}.notice{margin-top:14px;padding:12px 14px;border-radius:10px;background:rgba(246,200,95,.07);border:1px solid rgba(246,200,95,.18);color:#d7c58e;font-size:12px}
    .groupbar{display:flex;gap:7px;overflow:auto;margin-bottom:14px;padding-bottom:2px}.groupbar button{border:1px solid var(--border);background:#19191d;color:#96969e;border-radius:8px;padding:7px 11px;white-space:nowrap;cursor:pointer}.groupbar button.active{background:#29282e;color:#fff;border-color:rgba(255,255,255,.15)}.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field-card{padding:14px;min-height:122px}.field-top{display:flex;justify-content:space-between;gap:10px}.field-label{font-weight:650}.field-key{font:10px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#696971;overflow-wrap:anywhere}.field-desc{color:var(--muted);font-size:11px;margin:4px 0 11px;min-height:34px}.control input,.control select{width:100%;height:36px;border:1px solid var(--border);background:#101013;color:#eee;border-radius:8px;padding:0 10px;outline:none}.control input:focus,.control select:focus{border-color:rgba(166,108,255,.55);box-shadow:0 0 0 3px rgba(166,108,255,.08)}.toggle{display:flex;align-items:center;gap:9px;width:max-content;cursor:pointer}.toggle input{display:none}.track{width:39px;height:22px;padding:3px;border-radius:20px;background:#37373c;transition:.18s}.thumb{width:16px;height:16px;border-radius:50%;background:#aaa;transition:.18s}.toggle input:checked+.track{background:linear-gradient(90deg,#e94f63,#9d61e8)}.toggle input:checked+.track .thumb{transform:translateX(17px);background:#fff}.multi{display:flex;flex-wrap:wrap;gap:6px}.chip{display:flex;align-items:center;gap:5px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;background:#111114;color:#bbb}.chip input{accent-color:var(--purple)}
    .logbox{margin:0;background:#0b0b0d;border:1px solid var(--border);border-radius:10px;padding:15px;min-height:480px;max-height:68vh;overflow:auto;color:#bbb;font:12px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-word}.backup-list{display:grid;gap:8px}.backup{display:flex;justify-content:space-between;gap:12px;padding:12px 13px;border:1px solid var(--border);border-radius:9px;background:#17171a}.backup small{color:var(--muted)}.empty{grid-column:1/-1;padding:60px;text-align:center;color:var(--muted)}.toast{position:fixed;right:28px;bottom:28px;max-width:420px;padding:12px 15px;background:#26262b;border:1px solid rgba(255,255,255,.14);border-radius:10px;box-shadow:var(--shadow);opacity:0;transform:translateY(30px);pointer-events:none;transition:.2s;z-index:30}.toast.show{opacity:1;transform:none}.toast.error{border-color:rgba(255,92,104,.45);color:#ffb2b6}.loading{opacity:.58;pointer-events:none}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:11px}.players{width:100%;border-collapse:collapse;min-width:860px}.players th,.players td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border)}.players th{color:#777;font-size:11px;font-weight:600;background:#131316}.players td{color:#d2d2d7}.players tr:last-child td{border-bottom:0}.players tr:hover td{background:#1d1d21}.player-name{font-weight:650;color:#fff}.sub{display:block;color:#777;font-size:10px;margin-top:2px}.row-actions{display:flex;gap:6px}.row-actions .btn{height:30px;padding:0 9px;font-size:11px}.tool-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.tool-card{border:1px solid var(--border);background:#18181b;border-radius:12px;padding:16px}.tool-card h3{margin:0 0 4px;font-size:14px}.tool-card p{margin:0 0 13px;color:var(--muted);font-size:11px}.tool-card input,.tool-card textarea{width:100%;border:1px solid var(--border);background:#101013;color:#eee;border-radius:8px;padding:9px 10px;outline:none;margin-bottom:8px}.tool-card textarea{min-height:86px;resize:vertical}.api-error{padding:18px;border:1px solid rgba(246,200,95,.2);background:rgba(246,200,95,.06);border-radius:11px;color:#d9c997}.pill{display:inline-flex;align-items:center;padding:3px 7px;border-radius:999px;background:#29292e;color:#aaa;font-size:10px}
    @media(max-width:960px){.app{width:100%;min-height:100vh;margin:0;border:0;border-radius:0;grid-template-columns:76px minmax(0,1fr)}.brand{justify-content:center}.brand div:last-child,.nav .label,.sidebar-foot{display:none}.nav button{justify-content:center}.cards{grid-template-columns:repeat(2,1fr)}.field-grid,.tool-grid{grid-template-columns:1fr}.content{padding:18px}.commandbar{padding:0 12px}.dirty{display:none!important}}
    @media(max-width:580px){.app{grid-template-columns:1fr}.sidebar{position:fixed;bottom:0;left:0;right:0;height:62px;z-index:20;border:0;border-top:1px solid var(--border);padding:7px}.brand,.sidebar-foot{display:none}.nav{display:flex;justify-content:space-around}.nav button{padding:7px 10px}.workspace{padding-bottom:62px}.cards{grid-template-columns:1fr 1fr}.commandbar .btn:not(.primary){display:none}.page-head{display:block}.doc-badge{display:inline-block;margin-top:10px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">P</div><div><strong>Palworld</strong><small>Server Console</small></div></div>
    <nav class="nav">
      <button data-view="overview" class="active"><span class="ico">⌂</span><span class="label">概览</span></button>
      <button data-view="players"><span class="ico">◎</span><span class="label">全部成员</span></button>
      <button data-view="tools"><span class="ico">✦</span><span class="label">管理工具</span></button>
      <button data-view="config"><span class="ico">⌘</span><span class="label">世界配置</span></button>
      <button data-view="arguments"><span class="ico">›_</span><span class="label">启动参数</span></button>
      <button data-view="logs"><span class="ico">≡</span><span class="label">运行日志</span></button>
      <button data-view="backups"><span class="ico">⇅</span><span class="label">导入导出</span></button>
    </nav>
    <div class="sidebar-foot"><div class="server-mini"><span id="sideDot" class="dot"></span><span id="sideState">正在检查</span></div><div id="serverAddress">当前主机 · UDP 8211</div></div>
  </aside>
  <section id="workspace" class="workspace">
    <header class="commandbar">
      <div class="search"><input id="search" placeholder="搜索配置名称或英文参数键"><span class="shortcut">/</span></div>
      <span id="dirty" class="dirty">● 未应用</span>
      <button id="reload" class="btn">重新读取</button>
      <button id="save" class="btn">保存草稿</button>
      <button id="apply" class="btn primary">保存并应用</button>
    </header>
    <main id="content" class="content"></main>
  </section>
</div>
<div id="toast" class="toast"></div>
<script>
const state={view:'overview',groups:[],fields:[],values:{},argumentFields:[],arguments:{},status:{},pal:{available:false,info:{},metrics:{},players:[],members:[]},activeGroup:'服务器管理',query:'',dirty:false,busy:false,logs:'',backups:[],docVersion:'1.0.0'};
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
$('#serverAddress').textContent=`${location.hostname} · UDP 8211`;
async function api(path,options={}){const response=await fetch(path,{headers:{'Content-Type':'application/json'},...options});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||`请求失败 (${response.status})`);return data}
function toast(message,error=false){const el=$('#toast');el.textContent=message;el.className='toast show'+(error?' error':'');clearTimeout(window._toast);window._toast=setTimeout(()=>el.className='toast',3300)}
function busy(on){state.busy=on;$('#workspace').classList.toggle('loading',on);document.querySelectorAll('button').forEach(b=>b.disabled=on)}
function setStatus(status){state.status=status||{};$('#sideDot').classList.toggle('on',!!status.running);$('#sideState').textContent=status.state||'状态未知'}
async function load(reload=false){busy(true);try{const data=await api(reload?'/api/reload':'/api/config',{method:reload?'POST':'GET'});Object.assign(state,{groups:data.groups,fields:data.fields,values:data.values,argumentFields:data.argumentFields,arguments:data.arguments,dirty:data.dirty,status:data.status,docVersion:data.documentationVersion});if(!state.groups.includes(state.activeGroup))state.activeGroup=state.groups[0];setStatus(data.status);render();refreshPalOverview();if(reload)toast('已重新读取 INI 与 Compose')}catch(e){toast(e.message,true)}finally{busy(false)}}
function setView(view){state.view=view;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('#search').placeholder=view==='config'?'搜索配置名称或英文参数键':'搜索功能';if(view==='logs')refreshLogs();else if(view==='backups')refreshBackups();else if(view==='players'||view==='tools')refreshPalOverview();else render()}
function head(title,desc){return `<div class="page-head"><div><h1>${esc(title)}</h1><p>${esc(desc)}</p></div><span class="doc-badge">官方文档 ${esc(state.docVersion)}</span></div>`}
function render(){if(state.view==='overview')renderOverview();else if(state.view==='players')renderPlayers();else if(state.view==='tools')renderTools();else if(state.view==='config')renderConfig();else if(state.view==='arguments')renderArguments();else if(state.view==='logs')renderLogs();else renderBackups();$('#dirty').classList.toggle('show',state.dirty)}
function renderOverview(){const s=state.status,m=state.pal.metrics||{},i=state.pal.info||{};$('#content').innerHTML=head('服务器概览','运行状态、游戏指标与常用控制')+`<div class="cards"><div class="metric"><div class="metric-label">服务状态</div><div class="metric-value ${s.running?'good':''}">${esc(s.state||'未知')}</div></div><div class="metric"><div class="metric-label">在线玩家</div><div class="metric-value">${esc(m.currentplayernum??(state.pal.players||[]).length)} / ${esc(m.maxplayernum??'—')}</div></div><div class="metric"><div class="metric-label">服务器 FPS</div><div class="metric-value">${esc(m.serverfps??'—')}</div></div><div class="metric"><div class="metric-label">游戏天数</div><div class="metric-value">${esc(m.days??'—')}</div></div></div><div class="cards" style="margin-top:12px"><div class="metric"><div class="metric-label">容器 CPU</div><div class="metric-value">${esc(s.cpu||'—')}</div></div><div class="metric"><div class="metric-label">容器内存</div><div class="metric-value">${esc(s.memory||'—')}</div></div><div class="metric"><div class="metric-label">世界据点</div><div class="metric-value">${esc(m.basecampnum??'—')}</div></div><div class="metric"><div class="metric-label">游戏版本</div><div class="metric-value">${esc(i.version||'—')}</div></div></div><section class="panel"><div class="panel-title"><h2>服务器控制</h2><span class="field-key">${esc(i.servername||s.container||'palworld-server')}</span></div><div class="actions"><button class="btn" onclick="serviceAction('start')">启动服务器</button><button class="btn" onclick="serviceAction('restart')">重启服务器</button><button class="btn danger" onclick="serviceAction('stop')">停止服务器</button><button class="btn" onclick="palAction('save')">保存世界</button><button class="btn" onclick="makeBackup()">备份配置</button></div>${state.pal.available?'':`<div class="notice">${esc(state.pal.error||'官方 REST API 尚未连接，在线玩家与游戏指标暂不可用。')}</div>`}</section><section class="panel"><div class="panel-title"><h2>当前镜像</h2><span class="pill">REST API 仅回环地址</span></div><div class="field-key">${esc(s.image||'—')}</div></section>`}
async function refreshPalOverview(){try{state.pal=await api('/api/pal/overview');render()}catch(e){state.pal={available:false,error:e.message,info:{},metrics:{},players:[],members:[]};render()}}
function renderPlayers(){const pal=state.pal,members=pal.members||[],online=members.filter(m=>m.online).length;if(!pal.available&&!members.length){$('#content').innerHTML=head('全部成员','玩家上线后自动建立成员档案，离线后仍会保留')+`<div class="api-error">${esc(pal.error||'官方 REST API 尚未连接')}。启用过程需要重新创建游戏容器。<div style="margin-top:12px"><button class="btn primary" onclick="enablePalApi()">启用官方 REST API</button></div></div>`;return}$('#content').innerHTML=head('全部成员',`共 ${members.length} 名成员，当前 ${online} 名在线`)+`${pal.available?'':`<div class="api-error" style="margin-bottom:12px">${esc(pal.error||'官方 REST API 尚未连接')}，当前显示已保存的成员档案。</div>`}<div class="notice" style="margin:0 0 12px">成员在首次被管理端检测到上线后写入本地档案；官方接口不提供离线玩家清单。</div><div class="table-wrap"><table class="players"><thead><tr><th>状态</th><th>玩家</th><th>等级</th><th>延迟</th><th>最近上线</th><th>IP 地址</th><th>操作</th></tr></thead><tbody>${members.length?members.map(p=>`<tr><td><span class="pill">${p.online?'在线':p.banned?'已封禁':'离线'}</span></td><td><span class="player-name">${esc(p.name||'未命名')}</span><span class="sub">${esc(p.accountName||p.userId||'')}</span></td><td>${esc(p.level??'—')}</td><td>${p.online&&Number.isFinite(Number(p.ping))?esc(Math.round(Number(p.ping)))+' ms':'—'}</td><td>${p.lastSeenAt?esc(new Date(p.lastSeenAt).toLocaleString('zh-CN',{hour12:false})):'—'}</td><td>${esc(p.ip||'—')}</td><td><div class="row-actions">${p.online?`<button class="btn player-action" data-action="kick" data-userid="${esc(p.userId)}" data-name="${esc(p.name)}">踢出</button>`:''}${p.banned?`<button class="btn player-action" data-action="unban" data-userid="${esc(p.userId)}" data-name="${esc(p.name)}">解封</button>`:`<button class="btn danger player-action" data-action="ban" data-userid="${esc(p.userId)}" data-name="${esc(p.name)}">封禁</button>`}</div></td></tr>`).join(''):'<tr><td colspan="7" class="empty">暂无成员档案</td></tr>'}</tbody></table></div>`;document.querySelectorAll('.player-action').forEach(button=>button.onclick=()=>playerAction(button.dataset.action,button.dataset.userid,button.dataset.name))}
function renderTools(){const available=state.pal.available;$('#content').innerHTML=head('管理工具','官方 REST API 提供的服务器操作')+`${available?'':`<div class="api-error" style="margin-bottom:12px">${esc(state.pal.error||'官方 REST API 尚未连接')}<div style="margin-top:12px"><button class="btn primary" onclick="enablePalApi()">启用官方 REST API</button></div></div>`}<div class="tool-grid"><section class="tool-card"><h3>全服公告</h3><p>向当前在线玩家发送服务器公告。</p><textarea id="announceMessage" placeholder="输入公告内容"></textarea><button class="btn primary" onclick="announce()" ${available?'':'disabled'}>发送公告</button></section><section class="tool-card"><h3>世界存档</h3><p>立即调用官方接口保存当前世界进度。</p><button class="btn" onclick="palAction('save')" ${available?'':'disabled'}>立即保存世界</button></section><section class="tool-card"><h3>解除封禁</h3><p>填写玩家 userId，例如 steam_7656…</p><input id="unbanUserId" placeholder="玩家 userId"><button class="btn" onclick="unban()" ${available?'':'disabled'}>解除封禁</button></section><section class="tool-card"><h3>运行信息</h3><p>世界 GUID 与服务器运行信息。</p><div class="field-key">${esc(state.pal.info?.worldguid||'—')}</div></section></div>`}
async function palAction(action,payload={}){busy(true);try{const data=await api('/api/pal/action',{method:'POST',body:JSON.stringify({action,...payload})});if(data.overview)state.pal=data.overview;toast(data.message);render()}catch(e){toast(e.message,true)}finally{busy(false)}}
async function enablePalApi(){if(!confirm('将生成内部管理员密码、启用官方 REST API，并重新创建游戏容器。当前玩家会断线，确认继续吗？'))return;busy(true);try{const data=await api('/api/pal/enable',{method:'POST',body:'{}'});toast(data.message);await load(true);setTimeout(refreshPalOverview,2500)}catch(e){toast(e.message,true)}finally{busy(false)}}
function playerAction(action,userid,name){const labels={kick:'踢出',ban:'封禁',unban:'解除封禁'};if(!confirm(`确认${labels[action]}玩家「${name}」吗？`))return;if(action==='unban'){palAction(action,{userid});return}const message=prompt('发送给玩家的提示信息','管理员操作')||'管理员操作';palAction(action,{userid,message})}
function announce(){const message=$('#announceMessage').value.trim();if(message)palAction('announce',{message});else toast('请输入公告内容',true)}
function unban(){const userid=$('#unbanUserId').value.trim();if(userid&&confirm(`确认解除 ${userid} 的封禁吗？`))palAction('unban',{userid});else if(!userid)toast('请输入玩家 userId',true)}
function visibleFields(){const q=state.query.trim().toLowerCase();return state.fields.filter(f=>f.group===state.activeGroup&&(!q||`${f.label} ${f.key} ${f.description}`.toLowerCase().includes(q)))}
function control(field,value,scope='values'){const data=`data-scope="${scope}" data-key="${esc(field.key)}"`;if(field.type==='boolean')return `<label class="toggle"><input ${data} type="checkbox" ${value?'checked':''}><span class="track"><span class="thumb"></span></span><span>${value?'已开启':'已关闭'}</span></label>`;if(field.type==='select')return `<select ${data}>${field.options.map(o=>`<option value="${esc(o)}" ${String(o)===String(value)?'selected':''}>${esc(enumLabel(field.key,o))}</option>`).join('')}</select>`;if(field.type==='multi')return `<div class="multi">${field.options.map(o=>`<label class="chip"><input ${data} data-option="${esc(o)}" type="checkbox" ${(value||[]).includes(o)?'checked':''}>${esc(o)}</label>`).join('')}</div>`;const numeric=['integer','number','optionalInteger'].includes(field.type);const type=numeric?'number':field.type==='password'?'password':'text';const attrs=numeric?`min="${field.min??''}" max="${field.max??''}" step="${field.step??'any'}"`:'';return `<input ${data} type="${type}" value="${esc(value??'')}" ${attrs}>`}
function enumLabel(key,value){const map={Difficulty:{None:'无预设',Normal:'普通',Hard:'困难'},DeathPenalty:{None:'无掉落',Item:'掉落物品（保留装备）',ItemAndEquipment:'掉落物品与装备',All:'掉落物品、装备和队伍帕鲁'},RandomizerType:{None:'不随机',Region:'按区域随机',All:'完全随机'},LogFormatType:{Text:'文本',Json:'JSON'},logFormat:{text:'文本',json:'JSON'}};return map[key]?.[value]||value}
function bindControls(){document.querySelectorAll('[data-key]').forEach(el=>{el.addEventListener(el.type==='text'||el.type==='number'||el.type==='password'?'input':'change',changeValue)})}
function changeValue(e){const el=e.target,scope=el.dataset.scope,key=el.dataset.key,target=state[scope],fields=scope==='arguments'?state.argumentFields:state.fields,field=fields.find(f=>f.key===key);if(field.type==='multi')target[key]=[...document.querySelectorAll(`[data-scope="${scope}"][data-key="${CSS.escape(key)}"][data-option]:checked`)].map(x=>x.dataset.option);else if(field.type==='boolean'){target[key]=el.checked;el.closest('.toggle').lastElementChild.textContent=el.checked?'已开启':'已关闭'}else if(field.type==='integer')target[key]=el.value===''?'':parseInt(el.value,10);else if(field.type==='number')target[key]=el.value===''?'':parseFloat(el.value);else if(field.type==='optionalInteger')target[key]=el.value===''?null:parseInt(el.value,10);else target[key]=el.value;state.dirty=true;$('#dirty').classList.add('show')}
function renderConfig(){const fields=visibleFields();$('#content').innerHTML=head('世界配置','配置项与中文说明依据 Palworld Server Guide 1.0.0 整理')+`<div class="groupbar">${state.groups.map(g=>`<button data-group="${esc(g)}" class="${g===state.activeGroup?'active':''}">${esc(g)}</button>`).join('')}</div><div class="field-grid">${fields.length?fields.map(f=>`<article class="field-card"><div class="field-top"><span class="field-label">${esc(f.label)}</span><span class="field-key">${esc(f.key)}</span></div><div class="field-desc">${esc(f.description)}</div><div class="control">${control(f,state.values[f.key])}</div></article>`).join(''):'<div class="empty">没有匹配的配置项</div>'}</div>`;document.querySelectorAll('[data-group]').forEach(b=>b.onclick=()=>{state.activeGroup=b.dataset.group;renderConfig()});bindControls()}
function renderArguments(){const q=state.query.trim().toLowerCase();const fields=state.argumentFields.filter(f=>!q||`${f.label} ${f.key} ${f.description}`.toLowerCase().includes(q));$('#content').innerHTML=head('启动参数','管理官方文档列出的 PalServer 启动参数；应用后会重新创建容器')+`<div class="notice" style="margin:0 0 14px">监听端口会同步更新 Docker UDP 映射；-publicport 只用于社区服务器公开信息，不改变实际监听端口。</div><div class="field-grid">${fields.map(f=>`<article class="field-card"><div class="field-top"><span class="field-label">${esc(f.label)}</span><span class="field-key">${esc(f.key)}</span></div><div class="field-desc">${esc(f.description)}</div><div class="control">${control(f,state.arguments[f.key],'arguments')}</div></article>`).join('')}</div>`;bindControls()}
async function refreshStatus(){try{setStatus(await api('/api/status'));await refreshPalOverview()}catch(e){toast(e.message,true)}}
async function serviceAction(action){const names={start:'启动',stop:'停止',restart:'重启'};if((action==='stop'||action==='restart')&&!confirm(`确认${names[action]}帕鲁服务器吗？`))return;busy(true);try{const data=await api('/api/service/action',{method:'POST',body:JSON.stringify({action})});setStatus(data.status);toast(`服务器${names[action]}完成`);render()}catch(e){toast(e.message,true)}finally{busy(false)}}
async function refreshLogs(){try{const data=await api('/api/logs?lines=220');state.logs=data.logs;renderLogs()}catch(e){toast(e.message,true)}}
function renderLogs(){$('#content').innerHTML=head('运行日志','最近 220 行服务端日志')+`<section class="panel" style="margin-top:0"><div class="panel-title"><h2>Palworld Server</h2><button class="btn" onclick="refreshLogs()">刷新日志</button></div><pre class="logbox">${esc(state.logs||'正在读取…')}</pre></section>`}
async function refreshBackups(){try{state.backups=(await api('/api/backups')).items;renderBackups()}catch(e){toast(e.message,true)}}
function renderBackups(){$('#content').innerHTML=head('配置与存档','完整导出或恢复世界存档和服务器配置')+`<div class="tool-grid"><section class="tool-card"><h3>导出配置与存档</h3><p>先请求游戏保存世界，然后下载包含 Saved、INI、Compose 和成员档案的 ZIP。</p><button class="btn primary" onclick="exportArchive()">下载完整备份</button></section><section class="tool-card"><h3>导入配置与存档</h3><p>仅支持本管理端导出的 ZIP。导入会停止游戏服，并自动保留当前完整备份。</p><input id="archiveFile" type="file" accept=".zip,application/zip"><button class="btn danger" onclick="importArchive()">校验并导入</button></section></div><section class="panel"><div class="panel-title"><h2>配置自动备份</h2><button class="btn" onclick="makeBackup()">立即备份 INI</button></div><div class="backup-list">${state.backups.length?state.backups.map(b=>`<div class="backup"><span>${esc(b.name)}</span><small>${formatBytes(b.size)} · ${new Date(b.modifiedAt).toLocaleString()}</small></div>`).join(''):'<div class="empty">暂无配置备份</div>'}</div></section>`}
function formatBytes(n){return n<1024?`${n} B`:`${(n/1024).toFixed(1)} KB`}
async function makeBackup(){try{const data=await api('/api/backup',{method:'POST',body:'{}'});toast(data.message);if(state.view==='backups')refreshBackups()}catch(e){toast(e.message,true)}}
function exportArchive(){toast('正在生成完整备份，下载会自动开始');window.location.href='/api/archive/export'}
async function importArchive(){const input=$('#archiveFile'),file=input?.files?.[0];if(!file){toast('请先选择 ZIP 文件',true);return}if(!confirm(`将导入「${file.name}」，期间会停止游戏服务器。当前配置与存档会先完整备份，确认继续吗？`))return;busy(true);try{const response=await fetch('/api/archive/import',{method:'POST',headers:{'Content-Type':'application/zip'},body:file});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||`导入失败 (${response.status})`);toast(`${data.message}；原数据备份为 ${data.backup}`);await load(true)}catch(e){toast(e.message,true)}finally{busy(false)}}
async function save(apply=false){if(apply&&!confirm('将备份配置、写入 INI 与启动参数，并重新创建帕鲁容器。继续吗？'))return;busy(true);try{const data=await api(apply?'/api/apply':'/api/config',{method:apply?'POST':'PUT',body:JSON.stringify({values:state.values,arguments:state.arguments})});state.dirty=!apply;$('#dirty').classList.toggle('show',state.dirty);if(data.status)setStatus(data.status);toast(data.message);render()}catch(e){toast(e.message,true)}finally{busy(false)}}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setView(b.dataset.view));$('#search').oninput=e=>{state.query=e.target.value;render()};$('#reload').onclick=()=>load(true);$('#save').onclick=()=>save(false);$('#apply').onclick=()=>save(true);document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();$('#search').focus()}if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='s'){e.preventDefault();save(false)}if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();save(true)}});load();setInterval(refreshStatus,15000);
</script>
</body>
</html>
